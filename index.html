<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Student Portfolio - Settings" />
    <title>Portfolio Settings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      #root {
        min-height: 100vh;
      }

      .settings-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .settings-card {
        width: min(980px, 100%);
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
        padding: 32px;
        display: grid;
        gap: 24px;
      }

      .card-header {
        display: grid;
        gap: 8px;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 0.75rem;
        color: #6366f1;
        font-weight: 700;
      }

      .card-text {
        color: #475569;
        max-width: 640px;
      }

      .settings-form {
        display: grid;
        gap: 20px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .field-group {
        display: grid;
        gap: 8px;
      }

      .field-label {
        font-size: 0.95rem;
        font-weight: 600;
        color: #334155;
      }

      input,
      select,
      button {
        font: inherit;
      }

      input,
      select {
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 12px 14px;
        background: #f8fafc;
        color: #0f172a;
      }

      input:focus,
      select:focus {
        outline: 2px solid rgba(99, 102, 241, 0.25);
        border-color: #6366f1;
      }

      .radio-group {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }

      .radio-option {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #334155;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }

      .primary-btn {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        background: #6366f1;
        color: #fff;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .primary-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(99, 102, 241, 0.25);
      }

      .status {
        color: #0f766e;
        font-weight: 600;
      }

      .summary-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        padding: 16px 18px;
        display: grid;
        gap: 8px;
      }

      .summary-card h2 {
        font-size: 1rem;
      }

      @media (max-width: 720px) {
        .settings-card {
          padding: 20px;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="../app.js"></script>
  </body>
</html>

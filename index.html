<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings Form</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "Segoe UI", Roboto, sans-serif;
        background: #f4f7fb;
        color: #14213d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #f4f7fb 0%, #eef2ff 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 720px);
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 18px 60px rgba(20, 33, 61, 0.12);
        padding: 32px;
      }

      .eyebrow {
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.78rem;
        font-weight: 700;
        color: #6d7cff;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.6rem, 2vw, 2.1rem);
      }

      .subtitle {
        margin: 0 0 24px;
        color: #55627a;
        line-height: 1.6;
      }

      .settings-form {
        display: grid;
        gap: 18px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field-group label {
        font-weight: 600;
      }

      .field-group input,
      .field-group select {
        border: 1px solid #d7def3;
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
        color: #14213d;
        background: #f9fbff;
      }

      .field-group input:focus,
      .field-group select:focus {
        outline: 2px solid #6d7cff;
        outline-offset: 2px;
      }

      .inline-grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 0;
        color: #42506a;
      }

      .checkbox-row input {
        width: 18px;
        height: 18px;
        accent-color: #6d7cff;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        background: linear-gradient(135deg, #6d7cff 0%, #4f6df5 100%);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .success {
        margin: 0;
        padding: 12px 14px;
        border-radius: 12px;
        background: #ecfdf3;
        color: #1e7a41;
        font-weight: 600;
      }

      @media (max-width: 600px) {
        .card {
          padding: 24px;
        }

        .inline-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
